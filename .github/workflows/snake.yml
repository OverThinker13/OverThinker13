name: Generate Snake Animation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 时间 0 点自动运行

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate snake SVG (light theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            .github/assets/github-contribution-grid-snake.svg
            .github/assets/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/assets/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update snake heatmap [skip ci]"
          git push
